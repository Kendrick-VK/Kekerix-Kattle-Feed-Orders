<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed Orders — Admin</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <div class="admin-header">
    <div class="admin-header-inner">
      <div>
        <div class="admin-title">Feed Orders Dashboard</div>
        <div class="admin-subtitle" id="week-label"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn-sm" onclick="prevWeek()">← Prev week</button>
        <button class="btn-sm" onclick="todayWeek()">This week</button>
        <button class="btn-sm" onclick="nextWeek()">Next week →</button>
        <a href="index.html" class="btn-sm" style="text-decoration:none">+ New order</a>
      </div>
    </div>
  </div>

  <div class="admin-container">

    <div class="metric-grid" id="metrics"></div>

    <div class="filter-bar">
      <select id="filter-product" onchange="applyFilters()">
        <option value="">All products</option>
        <option>Wet distillers</option>
        <option>Modified distillers</option>
        <option>Dry distillers</option>
        <option>Loosehulls</option>
        <option>Soyhull pellets</option>
        <option>Syrup</option>
        <option>Corn screenings</option>
      </select>
      <select id="filter-status" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option>Scheduled</option>
        <option>Sent out</option>
        <option>Delivered</option>
        <option>Cancelled</option>
      </select>
      <select id="filter-customer" onchange="applyFilters()">
        <option value="">All farmers</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search farmer, plant, load #..." oninput="applyFilters()" style="flex:2;min-width:180px" />
    </div>

    <div class="table-wrap">
      <table class="load-table" id="load-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Load #</th>
            <th>Customer</th>
            <th>Plant</th>
            <th>Trucker</th>
            <th>Loads</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="8" class="table-empty"><span class="spinner"></span> Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <div class="modal-backdrop" id="modal-backdrop" onclick="closeModal()" style="display:none"></div>
  <div class="modal" id="edit-modal" style="display:none">
    <div class="modal-title">Edit load</div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div style="margin-top:1rem">
      <label class="modal-label">Load number</label>
      <input type="text" id="m-loadnum" placeholder="e.g. SC136-0574-001" style="width:100%" />
    </div>
    <div style="margin-top:0.75rem">
      <label class="modal-label">Plant</label>
      <input type="text" id="m-plant" placeholder="e.g. Sioux Center, Goldfield" style="width:100%" />
    </div>
    <div style="margin-top:0.75rem">
      <label class="modal-label">Trucker</label>
      <select id="m-trucker-select" onchange="truckerSelectChange()" style="width:100%;margin-bottom:6px">
        <option value="">Choose trucker...</option>
        <option>Midwest Hauling</option>
        <option>Big Sioux Transport</option>
        <option>Prairie Freight</option>
        <option>Dakota Feed Haulers</option>
        <option>Other (type below)</option>
      </select>
      <input type="text" id="m-trucker-custom" placeholder="Type trucker name" style="width:100%;display:none" />
    </div>
    <div style="margin-top:0.75rem">
      <label class="modal-label">Status</label>
      <select id="m-status" style="width:100%">
        <option>Scheduled</option>
        <option>Sent out</option>
        <option>Delivered</option>
        <option>Cancelled</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-top:1.25rem">
      <button class="btn-sm" onclick="closeModal()" style="flex:1;padding:9px">Cancel</button>
      <button class="btn-primary" onclick="saveEdit()" style="flex:2;margin-top:0">Save</button>
    </div>
    <p style="font-size:12px;margin-top:0.5rem;color:green" id="modal-msg"></p>
  </div>

  <script src="admin.js"></script>
</body>
</html>
